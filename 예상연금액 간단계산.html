    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }
        /* 탭 UI */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ecf0f1;
        }
        .tab-btn {
            flex: 1;
            padding: 14px 10px;
            border: none;
            background: #ecf0f1;
            color: #7f8c8d;
            font-weight: bold;
            font-size: 15px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn.active {
            background: #3498db;
            color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: #dfe6e9;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .tab-desc {
            text-align: center;
            color: #7f8c8d;
            font-size: 13.5px;
            margin-bottom: 20px;
        }
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-control {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 6px;
            color: #34495e;
            font-size: 14px;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            text-align: center; 
        }
        .dynamic-input {
            display: none;
            grid-column: 1 / -1;
            background: #f1f4f7;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            margin-top: 5px;
        }
        .btn-container {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 10px;
        }
        button.action-btn {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.action-btn:hover {
            background-color: #27ae60;
        }
        #tab2 button.action-btn {
            background-color: #e67e22;
        }
        #tab2 button.action-btn:hover {
            background-color: #d35400;
        }
        .result-summary {
            background: #e8f8f5;
            border: 1px solid #a3e4d7;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            display: none;
        }
        #tab2 .result-summary {
            background: #fdf2e3;
            border: 1px solid #f5cba7;
        }
        .result-summary h2 {
            margin-top: 0;
            color: #16a085;
            font-size: 18px;
        }
        #tab2 .result-summary h2 {
            color: #d35400;
        }
        .result-item {
            margin: 8px 0;
            font-size: 15px;
        }
        .result-item span {
            font-weight: bold;
            color: #2c3e50;
        }
        .chart-container {
            margin-top: 30px;
            position: relative;
            height: 380px;
            display: none;
        }
        .table-container {
            margin-top: 30px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            font-size: 14px;
        }
        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #ebedef;
            color: #34495e;
            text-align: center;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .sub-narrow {
            max-width: 300px;
        }
        .sub-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .sub-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        .sub-grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
        }

        /* =====================================================
           모바일 최적화 (휴대폰 화면 대응)
           ===================================================== */
        @media (max-width: 700px) {
            body {
                padding: 8px;
            }
            .container {
                padding: 16px 14px;
                border-radius: 10px;
            }
            h1 {
                font-size: 18px;
                margin-bottom: 14px;
                line-height: 1.4;
            }
            .tabs {
                gap: 5px;
                margin-bottom: 16px;
            }
            .tab-btn {
                padding: 10px 4px;
                font-size: 12.5px;
                line-height: 1.3;
            }
            .tab-desc {
                font-size: 12px;
                margin-bottom: 14px;
            }
            .input-group {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .sub-narrow {
                max-width: none;
            }
            .sub-grid-2, .sub-grid-3, .sub-grid-4 {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            label {
                font-size: 12.5px;
            }
            input, select {
                padding: 9px 6px;
                font-size: 16px; /* iOS 자동 확대 방지를 위해 16px 이상 유지 */
            }
            button.action-btn {
                font-size: 15px;
                padding: 13px;
            }
            .result-summary {
                padding: 14px;
                margin-top: 18px;
            }
            .result-summary h2 {
                font-size: 16px;
            }
            .result-item {
                font-size: 13.5px;
            }
            .chart-container {
                height: 260px;
                margin-top: 20px;
            }
            .table-container {
                margin-top: 20px;
                -webkit-overflow-scrolling: touch;
            }
            table {
                font-size: 12px;
                min-width: 560px; /* 가로 스크롤로 표를 온전히 볼 수 있도록 최소 너비 지정 */
            }
            th, td {
                padding: 8px 7px;
                white-space: nowrap;
            }
        }

        @media (max-width: 420px) {
            h1 {
                font-size: 16px;
            }
            .tab-btn {
                font-size: 11px;
                padding: 9px 3px;
            }
            .input-group {
                grid-template-columns: 1fr;
            }
            .sub-grid-2, .sub-grid-3, .sub-grid-4 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>[ 예상연금액 계산 시뮬레이터 ] (단위: 만원)</h1>

    <div class="tabs">
        <button type="button" class="tab-btn active" id="tabBtn1" onclick="switchTab(1)">① 월 수령액 계산 (적립금 → 월수령액)</button>
        <button type="button" class="tab-btn" id="tabBtn2" onclick="switchTab(2)">② 필요 적립금 계산 (월수령액 → 적립금)</button>
    </div>

    <!-- ================= 탭 1 : 기존 계산기 (적립금 → 월수령액) ================= -->
    <div id="tab1" class="tab-content active">
    <p class="tab-desc">연금개시시점의 적립금을 입력하면, 원하는 인출 방식에 따라 월 수령액과 소진 시점을 계산합니다.</p>

    <div class="input-group">
        <div class="form-control">
            <label for="currentBalance">* 개시시점 적립금액 (만원)</label>
            <input type="text" id="currentBalance" inputmode="numeric" pattern="[0-9]*" value="10,000" oninput="formatInputWithCommas(this)">
        </div>
        <div class="form-control">
            <label for="currentAge">* 연금개시 나이 (세)</label>
            <input type="text" id="currentAge" inputmode="numeric" pattern="[0-9]*" value="55" oninput="formatInputWithCommas(this)">
        </div>
        <div class="form-control">
            <label for="yieldRate">* 운용이율 (%)</label>
            <input type="text" id="yieldRate" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" value="5.0">
        </div>
        
        <div class="form-control" style="grid-column: 1 / -1;">
            <label for="withdrawType">* 연금 인출(수령) 방법 선택</label>
            <select id="withdrawType" onchange="toggleInputs()">
                <option value="amount">금액지정 (매월 일정액 인출)</option>
                <option value="period" selected>기간지정 (정해진 기간 동안 분할 인출)</option>
                <option value="increasing">금액체증형 (지정 주기로 인출액 증가)</option>
            </select>
        </div>

        <div id="inputAmount" class="dynamic-input">
            <div class="form-control sub-narrow">
                <label for="monthlyAmount">지정 인출금액 (월 / 만원)</label>
                <input type="text" id="monthlyAmount" inputmode="numeric" pattern="[0-9]*" value="100" oninput="formatInputWithCommas(this)">
            </div>
        </div>

        <div id="inputPeriod" class="dynamic-input" style="display: block;">
            <div class="form-control sub-narrow">
                <label for="withdrawPeriod">인출 기간 (년)</label>
                <input type="text" id="withdrawPeriod" inputmode="numeric" pattern="[0-9]*" value="10" oninput="formatInputWithCommas(this)">
            </div>
        </div>

        <div id="inputIncreasing" class="dynamic-input">
            <div class="sub-grid-3">
                <div class="form-control">
                    <label for="incMonthlyAmount">초기 인출금액 (월 / 만원)</label>
                    <input type="text" id="incMonthlyAmount" inputmode="numeric" pattern="[0-9]*" value="50" oninput="formatInputWithCommas(this)">
                </div>
                <div class="form-control">
                    <label for="incPeriod">체증 주기 (년)</label>
                    <input type="text" id="incPeriod" inputmode="numeric" pattern="[0-9]*" value="3" oninput="formatInputWithCommas(this)">
                </div>
                <div class="form-control">
                    <label for="incRate">체증률 (%)</label>
                    <input type="text" id="incRate" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" value="3">
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button type="button" class="action-btn" onclick="calculatePension()">시뮬레이션 실행</button>
        </div>
    </div>

    <div id="resultSummary" class="result-summary">

    <!-- ================= 탭 2 : 신규 계산기 (월수령액 → 필요 적립금) ================= -->
    <div id="tab2" class="tab-content">
    <p class="tab-desc">매월 받고 싶은 금액과 수령 기간을 입력하면, 연금개시시점에 필요한 적립금(원금)을 역산합니다.</p>

    <div class="input-group">
        <div class="form-control">
            <label for="currentAge2">* 연금개시 나이 (세)</label>

                    <input type="text" id="incPeriod2" inputmode="numeric" pattern="[0-9]*" value="3" oninput="formatInputWithCommas(this)">
                </div>
                <div class="form-control">
                    <label for="incRate2">체증률 (%)</label>
                    <input type="text" id="incRate2" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" value="3">
                </div>
                <div class="form-control">
                    <label for="incTotalPeriod2">수령 희망 기간 (년)</label>

                <tr>
                    <th style="text-align: center;">나이</th>

                    <th>월 인출금액 (만원)</th>
                    <th>연간 인출금액 (만원)</th>
                    <th>인출률 (%)</th>
                    <th>기초 적립금 (만원)</th>

</div>

<script>
    let myChart = null;
    let myChart2 = null;

    // 탭 전환
    function switchTab(n) {
        document.getElementById('tab1').classList.toggle('active', n === 1);
        document.getElementById('tab2').classList.toggle('active', n === 2);
        document.getElementById('tabBtn1').classList.toggle('active', n === 1);
        document.getElementById('tabBtn2').classList.toggle('active', n === 2);
    }

    // 숫자에 실시간으로 천단위 콤마(,)를 추가하는 가독성 보완 함수
    function formatInputWithCommas(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        if (value) {
            input.value = parseInt(value, 10).toLocaleString('ko-KR');
        } else {
            input.value = '';
        }
    }

    // 콤마가 포함된 문자열을 연산 가능한 순수 숫자로 정제
    function parseValue(id) {
        let valStr = document.getElementById(id).value.replace(/,/g, '');
        return parseFloat(valStr) || 0;
    }

    function toggleInputs() {
        const type = document.getElementById('withdrawType').value;
        document.getElementById('inputAmount').style.display = type === 'amount' ? 'block' : 'none';
        document.getElementById('inputPeriod').style.display = type === 'period' ? 'block' : 'none';
        document.getElementById('inputIncreasing').style.display = type === 'increasing' ? 'block' : 'none';
    }

    function toggleInputs2() {
        const type = document.getElementById('withdrawType2').value;
        document.getElementById('inputLevel2').style.display = type === 'level' ? 'block' : 'none';
        document.getElementById('inputIncreasing2').style.display = type === 'increasing' ? 'block' : 'none';
    }

    function formatManwon(num) {
        if(num <= 0) return "0만원";
        return Math.floor(num).toLocaleString('ko-KR') + "만원";
    }

    // ===================================================================
    // 탭 1 : 적립금 → 월 수령액 계산 (기존 로직)
    // ===================================================================
    function calculatePension() {
        const currentBalance = parseValue('currentBalance');
        const currentAge = parseValue('currentAge');
        const yieldRate = parseValue('yieldRate') / 100;
        const withdrawType = document.getElementById('withdrawType').value;
        const currentYear = new Date().getFullYear();

        let tableBodyHTML = '';
        let balance = currentBalance;
        
        let depletionAge = null;
        let depletionYear = null;
        let age105Balance = 0;
        let initialMonthlyStr = '';

        let monthlyWithdraw = 0;
        let periodYears = 0;
        let incPeriod = 1;
        let incRate = 0;

        if (withdrawType === 'amount') {
            monthlyWithdraw = parseValue('monthlyAmount');
            initialMonthlyStr = `${formatManwon(monthlyWithdraw)} / 월`;
        } else if (withdrawType === 'period') {
            periodYears = parseValue('withdrawPeriod') || 1;
            
            // 월별 복리 반영 원리금 균등 인출(PMT) 공식 적용
            const monthlyRate = yieldRate / 12;
            const totalMonths = periodYears * 12;
            
            if (monthlyRate === 0) {
                monthlyWithdraw = currentBalance / totalMonths;
            } else {
                monthlyWithdraw = currentBalance * (monthlyRate / (1 - Math.pow(1 + monthlyRate, -totalMonths)));
            }
            initialMonthlyStr = `${formatManwon(monthlyWithdraw)} / 월 (원리금 균등 완전소진)`;
        } else if (withdrawType === 'increasing') {
            monthlyWithdraw = parseValue('incMonthlyAmount');
            incPeriod = parseValue('incPeriod') || 1;
            incRate = parseValue('incRate');
            initialMonthlyStr = `${formatManwon(monthlyWithdraw)} / 월 (초기값, ${incPeriod}년 주기 ${incRate}% 체증)`;
        }

        // ---- 월 단위 시뮬레이션 ----
        // 인출액(월복리 PMT) 산정 기준과 동일하게 이자도 매월 monthlyRate로 계산하여
        // 표/그래프의 잔액이 실제 수학적 잔액과 정확히 일치하도록 함
        const monthlyRate = yieldRate / 12;
        const totalMonths = periodYears * 12; // 'period' 방식일 때만 의미 있음

        let curMonthly = monthlyWithdraw;
        let monthIndex = 0;

        let labels = [];
        let dataBalances = [];
        let dataWithdraws = [];

        for (let age = currentAge; age <= 105; age++) {
            const year = currentYear + (age - currentAge);

            let beforeBalance = balance;
            if (beforeBalance <= 0) {
                break;
            }

            let monthlyDisplay = curMonthly; // 표에 표시할 해당 연도의 월 인출액
            let annualWithdraw = 0;

            for (let mm = 0; mm < 12; mm++) {
                if (balance <= 0) break;

                // '기간지정' 방식은 지정 개월 수만큼 정확히 완전 소진되도록 설계되어 있으므로,
                // 그 시점에 도달하면 부동소수점 오차로 남은 극소 잔액을 0으로 정리하고 종료
                if (withdrawType === 'period' && monthIndex >= totalMonths) {
                    balance = 0;
                    break;
                }

                let w = curMonthly;
                const grown = balance * (1 + monthlyRate);
                if (w >= grown) {
                    // 잔액(이자 포함)보다 인출액이 크거나 같으면 남은 만큼만 인출하여 정확히 0으로 소진
                    w = grown;
                    balance = 0;
                } else {
                    balance = grown - w;
                }
                annualWithdraw += w;
                monthIndex++;

                // 금액체증형: 지정 주기(개월)마다 인출액 증액
                if (withdrawType === 'increasing' && balance > 0) {
                    if (monthIndex % (incPeriod * 12) === 0) {
                        curMonthly = curMonthly * (1 + (incRate / 100));
                    }
                }
            }

            // 부동소수점 연산 누적 오차(예: 1e-9 수준)로 남는 극소 잔액은 0으로 정리
            if (Math.abs(balance) < 1e-6) balance = 0;
            let afterBalance = balance;

            if (depletionAge === null && afterBalance <= 0) {
                depletionAge = age;
                depletionYear = year;
            }

            let withdrawRate = beforeBalance > 0 ? (annualWithdraw / beforeBalance) * 100 : 0;
            if (withdrawRate > 100) withdrawRate = 100;

            labels.push(`${age}세`);
            dataBalances.push(Math.floor(beforeBalance));
            dataWithdraws.push(Math.floor(annualWithdraw));

            tableBodyHTML += `<tr>
                <td style="text-align: center;">${age}세</td>
                <td style="text-align: center;">${year}년</td>
                <td style="color: #2980b9; font-weight: bold;">${formatManwon(monthlyDisplay)}</td>
                <td>${formatManwon(annualWithdraw)}</td>
                <td style="color: #e67e22; font-weight: bold;">${withdrawRate.toFixed(1)}%</td>
                <td>${formatManwon(beforeBalance)}</td>
                <td>${formatManwon(afterBalance)}</td>
            </tr>`;

            if (age === 105) {
                age105Balance = afterBalance;
            }

            if (afterBalance <= 0) {
                break;
            }
        }

        document.getElementById('tableBody').innerHTML = tableBodyHTML;
        document.getElementById('simulationTable').style.display = 'table';
        document.getElementById('resultSummary').style.display = 'block';
        document.getElementById('chartWrapper').style.display = 'block';

        document.getElementById('resMonthly').innerHTML = `⊙ 초기 예상 인출 금액: <span>${initialMonthlyStr}</span>`;
        
        if (depletionAge !== null && depletionAge <= 105) {
            let statusText = withdrawType === 'period' ? '지정 기간 만료로 전액 소진됨' : '에 고갈됨';
            document.getElementById('resDepletion').innerHTML = `⊙ 적립금 고갈 시점: <span style="color: #c0392b;">${depletionAge}세 (${depletionYear}년) ${statusText}</span>`;
            document.getElementById('resAge105').style.display = 'none';
        } else {
            document.getElementById('resDepletion').innerHTML = `⊙ 적립금 고갈 시점: <span style="color: #27ae60;">105세까지 고갈되지 않음</span>`;
            document.getElementById('resAge105').style.display = 'block';
            document.getElementById('resAge105').innerHTML = `⊙ 105세 시점 적립금: <span style="color: #27ae60;">${formatManwon(age105Balance)}</span>`;
        }

        if (myChart) {
            myChart.destroy();
        }

        const ctx = document.getElementById('pensionChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '기초 적립금 (만원)',
                        data: dataBalances,
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.08)',
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: '연간 인출금액 (만원)',
                        data: dataWithdraws,
                        borderColor: '#e67e22',
                        backgroundColor: 'rgba(230, 126, 34, 0.7)',
                        borderWidth: 1,
                        type: 'bar'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return value.toLocaleString() + '만';
                            }
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.raw.toLocaleString() + ' 만원';
                            }
                        }
                    }
                }
            }
        });
    }

    // ===================================================================
    // 탭 2 : 월 수령액 → 필요 적립금 계산 (신규 로직)
    //  - 월 복리(운용이율/12)로 미래 인출금 흐름을 현재가치(PV)로 환산하여
    //    연금개시시점에 필요한 적립금(원금)을 역산합니다.
    //  - 이후 탭1과 동일한 방식(연 단위 표시)으로 정순 시뮬레이션을 돌려
    //    실제로 해당 기간 동안 잘 소진되는지 표/그래프로 검증합니다.
    // ===================================================================
    function calculateRequiredPrincipal() {
        const currentAge = parseValue('currentAge2');
        const yieldRate = parseValue('yieldRate2') / 100;
        const withdrawType = document.getElementById('withdrawType2').value;
        const currentYear = new Date().getFullYear();
        const monthlyRate = yieldRate / 12;

        let periodYears, initMonthly, incPeriod = 1, incRate = 0;
        let monthlySchedule = [];

        if (withdrawType === 'level') {
            initMonthly = parseValue('monthlyAmount2');
            periodYears = parseValue('withdrawPeriod2') || 1;
            const totalMonths = periodYears * 12;
            for (let m = 0; m < totalMonths; m++) monthlySchedule.push(initMonthly);
        } else {
            initMonthly = parseValue('incMonthlyAmount2');
            incPeriod = parseValue('incPeriod2') || 1;
            incRate = parseValue('incRate2');
            periodYears = parseValue('incTotalPeriod2') || 1;
            const totalMonths = periodYears * 12;
            let cur = initMonthly;
            for (let m = 0; m < totalMonths; m++) {
                monthlySchedule.push(cur);
                const monthNumber = m + 1;
                if (monthNumber % 12 === 0) {
                    const elapsedYears = monthNumber / 12;
                    if (elapsedYears % incPeriod === 0) {
                        cur = cur * (1 + incRate / 100);
                    }
                }
            }
        }

        const totalMonths = monthlySchedule.length;

        // 미래 인출금 흐름의 현재가치(PV) = 필요 적립금
        let requiredBalance = 0;
        if (monthlyRate === 0) {
            requiredBalance = monthlySchedule.reduce((a, b) => a + b, 0);
        } else {
            for (let m = 1; m <= totalMonths; m++) {
                requiredBalance += monthlySchedule[m - 1] / Math.pow(1 + monthlyRate, m);
            }
        }

        // ---- 정순 시뮬레이션 (월복리 기준으로 PV 산정과 동일한 방식으로 검증) ----
        // monthlySchedule에 있는 월별 인출 스케줄을 그대로, 매월 monthlyRate로 이자 계산 후
        // 인출하여 표에는 연 단위로 집계해서 보여준다. (PV 계산 기준과 완전히 일치하므로
        // 마지막 해에 잔액을 억지로 0으로 만드는 별도 처리가 필요 없음)
        let balance = requiredBalance;
        let monthIdx = 0;
        let tableBodyHTML = '';
        let labels = [];
        let dataBalances = [];
        let dataWithdraws = [];

        for (let age = currentAge; age < currentAge + periodYears; age++) {
            const year = currentYear + (age - currentAge);

            let beforeBalance = balance;
            let monthlyDisplay = monthlySchedule[monthIdx]; // 표에 표시할 해당 연도의 월 인출액
            let annualWithdraw = 0;

            for (let mm = 0; mm < 12 && monthIdx < totalMonths; mm++) {
                let w = monthlySchedule[monthIdx];
                const grown = balance * (1 + monthlyRate);
                if (w >= grown) {
                    // 반올림 오차 등으로 인출액이 잔액(이자 포함)보다 크면 남은 만큼만 인출
                    w = grown;
                    balance = 0;
                } else {
                    balance = grown - w;
                }
                annualWithdraw += w;
                monthIdx++;
            }

            // 부동소수점 연산 누적 오차(예: 1e-9 수준)로 남는 극소 잔액은 0으로 정리
            if (Math.abs(balance) < 1e-6) balance = 0;
            let afterBalance = balance;

            let withdrawRate = beforeBalance > 0 ? (annualWithdraw / beforeBalance) * 100 : 0;
            if (withdrawRate > 100) withdrawRate = 100;

            labels.push(`${age}세`);
            dataBalances.push(Math.floor(beforeBalance));
            dataWithdraws.push(Math.floor(annualWithdraw));

            tableBodyHTML += `<tr>
                <td style="text-align: center;">${age}세</td>
                <td style="text-align: center;">${year}년</td>
                <td style="color: #2980b9; font-weight: bold;">${formatManwon(monthlyDisplay)}</td>
                <td>${formatManwon(annualWithdraw)}</td>
                <td style="color: #e67e22; font-weight: bold;">${withdrawRate.toFixed(1)}%</td>
                <td>${formatManwon(beforeBalance)}</td>
                <td>${formatManwon(afterBalance)}</td>
            </tr>`;
        }

        document.getElementById('tableBody2').innerHTML = tableBodyHTML;
        document.getElementById('simulationTable2').style.display = 'table';
        document.getElementById('resultSummary2').style.display = 'block';
        document.getElementById('chartWrapper2').style.display = 'block';

        const endAge = currentAge + periodYears;
        const endYear = currentYear + periodYears;

        let typeDesc = withdrawType === 'level'
            ? `매월 ${formatManwon(initMonthly)} 정액 수령`
            : `초기 매월 ${formatManwon(initMonthly)}, ${incPeriod}년 주기 ${incRate}% 체증 수령`;

        document.getElementById('resRequiredBalance').innerHTML =
            `⊙ 연금개시시점(${currentAge}세) 필요 적립금: <span style="color:#c0392b; font-size:1.05em;">${formatManwon(requiredBalance)}</span>`;
        document.getElementById('resCheckFinal').innerHTML =
            `⊙ 조건: ${typeDesc}하며 ${periodYears}년간(${endAge}세, ${endYear}년까지) 수령 후 정확히 소진되도록 역산되었습니다.`;

        if (myChart2) {
            myChart2.destroy();
        }

        const ctx2 = document.getElementById('pensionChart2').getContext('2d');
        myChart2 = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '기초 적립금 (만원)',
                        data: dataBalances,
                        borderColor: '#e67e22',
                        backgroundColor: 'rgba(230, 126, 34, 0.08)',
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: '연간 인출금액 (만원)',
                        data: dataWithdraws,
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.7)',
                        borderWidth: 1,
                        type: 'bar'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return value.toLocaleString() + '만';
                            }
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.raw.toLocaleString() + ' 만원';
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
